name: Sync Files from Server

on:
  schedule:
    - cron: '0 0 * * *'  # At 00:00 every day.
  workflow_dispatch: # 允许手动触发 workflow

jobs:
  sync_and_pr:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync files from remote server
        env:
          REMOTE_URL: ${{ secrets.REMOTE_URL }}
          LOCAL_DESTINATION_PATH: ./DigitalGarden # 同步到当前 repo 目录，可以修改
        run: |
          # Download directory as zip from DUFS HTTP server
          # DUFS 支持 ?zip 参数将整个目录打包为 zip 文件下载
          # REMOTE_URL 例如: https://dufs-cf.19960312.xyz/obsidian_dg
          # 不需要添加 ?zip，脚本会自动添加
          
          ZIP_URL="${REMOTE_URL}?zip"
          ZIP_FILE="remote_files.zip"
          
          # 下载 zip 文件
          curl -L -o "$ZIP_FILE" "$ZIP_URL"
          
          # 解压到本地目录
          unzip -q "$ZIP_FILE" -d "$LOCAL_DESTINATION_PATH"
          
          # 清理 zip 文件
          rm "$ZIP_FILE"

      - name: Check for changes
        id: check_changes
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          git add .
          git status --porcelain
          if [ -z "$(git status --porcelain)" ]; then
            echo "::set-output name=has_changes::false"
            echo "No changes detected."
          else
            echo "::set-output name=has_changes::true"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git commit -m "chore: auto sync from remote server"

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets._PERSONAL_ACCESS_TOKEN }}
          branch: auto-pr # PR 的目标分支，可以修改
          title: "auto sync from Server"
          body: "auto"
          commit-message: "chore: auto sync from Server"